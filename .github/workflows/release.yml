name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.3.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show .NET SDK
        shell: pwsh
        run: |
          dotnet --version
          dotnet --info

      - name: Publish app
        shell: pwsh
        run: |
          dotnet restore ./customSTT/customSTT.csproj --runtime win-x64
          dotnet publish ./customSTT/customSTT.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            -p:ContinuousIntegrationBuild=true `
            -p:PublishReadyToRun=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            --output ./publish

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq 'workflow_dispatch') {
            $v = "${{ github.event.inputs.version }}".TrimStart('v')
          } else {
            $v = "$env:GITHUB_REF_NAME".TrimStart('v')
          }
          "value=$v" >> $env:GITHUB_OUTPUT

      - name: Package release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $releaseDir = "releases/v$version"
          $notesFile = "release-notes/$version.txt"
          if (-not (Test-Path $notesFile)) {
            $notesFile = "release-notes/template.txt"
          }
          & ./scripts/package-release.ps1 `
            -Version $version `
            -PublishDir ./publish `
            -ReleaseDir $releaseDir `
            -NotesFile $notesFile

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: customSTT v${{ steps.version.outputs.value }}
          body_path: releases/v${{ steps.version.outputs.value }}/RELEASE_NOTES.txt
          files: |
            releases/v${{ steps.version.outputs.value }}/customSTT-*.zip
          fail_on_unmatched_files: true
