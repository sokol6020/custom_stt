name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish app
        shell: pwsh
        run: |
          dotnet restore ./customSTT/customSTT.csproj --runtime win-x64
          dotnet publish ./customSTT/customSTT.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            -p:ContinuousIntegrationBuild=true `
            -p:PublishReadyToRun=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            --output ./publish

      - name: Package release
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart('v')
          $releaseDir = "releases/v$version"
          $notesFile = "release-notes/$version.txt"
          if (-not (Test-Path $notesFile)) {
            $notesFile = "release-notes/template.txt"
          }
          & ./scripts/package-release.ps1 `
            -Version $version `
            -PublishDir ./publish `
            -ReleaseDir $releaseDir `
            -NotesFile $notesFile

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: customSTT ${{ github.ref_name }}
          body_path: releases/${{ github.ref_name }}/RELEASE_NOTES.txt
          files: |
            releases/${{ github.ref_name }}/customSTT.exe
            releases/${{ github.ref_name }}/customSTT-*.zip
          fail_on_unmatched_files: true
